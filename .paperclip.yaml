schema: paperclip/v1

# ============================================================================
# CEO's Office — Paperclip runtime sidecar
# ============================================================================
# This file carries vendor-specific runtime config (adapters, cron triggers,
# budgets) that does not belong in the portable COMPANY.md / AGENTS.md base.
#
# Base-format tools ignore this file. Paperclip reads it at import time.
# ============================================================================

# ----------------------------------------------------------------------------
# Adapter configs — per agent
# ----------------------------------------------------------------------------
# All agents default to claude_local with claude-opus-4-7. Sub-agents use
# medium or low effort to save tokens; Chief of Staff runs at high.
# ----------------------------------------------------------------------------

agents:
  chief-of-staff:
    adapter:
      type: claude_local
      config:
        model: claude-opus-4-7
        effort: high
    inputs:
      env:
        ANTHROPIC_API_KEY:
          kind: secret
          requirement: required
    budget:
      daily_token_cap: 500000
      daily_cost_cap_usd: 25.00

  inbox-triage:
    adapter:
      type: claude_local
      config:
        model: claude-opus-4-7
        effort: medium
    inputs:
      env:
        ANTHROPIC_API_KEY:
          kind: secret
          requirement: required
        GOOGLE_OAUTH_TOKEN:
          kind: secret
          requirement: required
    budget:
      daily_token_cap: 800000
      daily_cost_cap_usd: 20.00

  slack-liaison:
    adapter:
      type: claude_local
      config:
        model: claude-opus-4-7
        effort: medium
    inputs:
      env:
        ANTHROPIC_API_KEY:
          kind: secret
          requirement: required
        SLACK_BOT_TOKEN:
          kind: secret
          requirement: required
    budget:
      daily_token_cap: 800000
      daily_cost_cap_usd: 20.00

  scheduler:
    adapter:
      type: claude_local
      config:
        model: claude-opus-4-7
        effort: medium
    inputs:
      env:
        ANTHROPIC_API_KEY:
          kind: secret
          requirement: required
        GOOGLE_OAUTH_TOKEN:
          kind: secret
          requirement: required
    budget:
      daily_token_cap: 200000
      daily_cost_cap_usd: 10.00

  task-tracker:
    adapter:
      type: claude_local
      config:
        model: claude-opus-4-7
        effort: medium
    inputs:
      env:
        ANTHROPIC_API_KEY:
          kind: secret
          requirement: required
        NOTION_TOKEN:
          kind: secret
          requirement: required
    budget:
      daily_token_cap: 300000
      daily_cost_cap_usd: 12.00

  talent-scout:
    adapter:
      type: claude_local
      config:
        model: claude-opus-4-7
        effort: medium
    inputs:
      env:
        ANTHROPIC_API_KEY:
          kind: secret
          requirement: required
        GOOGLE_OAUTH_TOKEN:
          kind: secret
          requirement: required
        NOTION_TOKEN:
          kind: secret
          requirement: required
        BRAVE_API_KEY:
          kind: secret
          requirement: optional
    budget:
      daily_token_cap: 400000
      daily_cost_cap_usd: 15.00

  contractor-ops:
    adapter:
      type: claude_local
      config:
        model: claude-opus-4-7
        effort: medium
    inputs:
      env:
        ANTHROPIC_API_KEY:
          kind: secret
          requirement: required
        NOTION_TOKEN:
          kind: secret
          requirement: required
        GOOGLE_OAUTH_TOKEN:
          kind: secret
          requirement: required
    budget:
      daily_token_cap: 200000
      daily_cost_cap_usd: 10.00

  finance-data:
    adapter:
      type: claude_local
      config:
        model: claude-opus-4-7
        effort: medium
    inputs:
      env:
        ANTHROPIC_API_KEY:
          kind: secret
          requirement: required
        STRIPE_API_KEY:
          kind: secret
          requirement: required
        RAMP_API_KEY:
          kind: secret
          requirement: optional
        NOTION_TOKEN:
          kind: secret
          requirement: required
    budget:
      daily_token_cap: 200000
      daily_cost_cap_usd: 10.00
    permissions:
      # Hard guardrail: finance agent has read-only scope on money systems
      scopes:
        - stripe:read
        - ramp:read
        - notion:write
      denied:
        - stripe:write
        - ramp:write

  vendor-manager:
    adapter:
      type: claude_local
      config:
        model: claude-opus-4-7
        effort: medium
    inputs:
